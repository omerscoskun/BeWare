services:
  postgres:
    image: postgres:17-alpine
    container_name: beware-postgres
    environment:
      POSTGRES_DB: beware
      POSTGRES_USER: beware
      POSTGRES_PASSWORD: beware
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beware -d beware"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: beware-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
