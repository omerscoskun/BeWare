<header class="sticky top-0 z-20 border-b border-neutral-800 bg-neutral-950/80 backdrop-blur">
  <div class="mx-auto flex max-w-6xl items-center gap-4 px-4 py-3">
    <a routerLink="/" class="text-xl font-bold tracking-tight">
      Be<span class="text-brand">Ware</span> Movies
    </a>

    <nav class="ml-2 flex items-center gap-1 text-sm">
      <a routerLink="/" routerLinkActive="text-white" [routerLinkActiveOptions]="{ exact: true }"
         class="rounded px-3 py-1.5 text-neutral-400 hover:text-white">Ana Sayfa</a>
      <a routerLink="/favorites" routerLinkActive="text-white"
         class="rounded px-3 py-1.5 text-neutral-400 hover:text-white">Favoriler</a>
    </nav>

    <div class="ml-auto">
      <input
        [(ngModel)]="query"
        (keyup.enter)="search()"
        type="search"
        placeholder="Film ara…"
        class="w-40 rounded-full border border-neutral-700 bg-neutral-900 px-4 py-1.5 text-sm
               outline-none transition focus:w-56 focus:border-brand"
      />
    </div>
  </div>
</header>

<main class="mx-auto max-w-6xl px-4 py-6">
  <router-outlet />
</main>
