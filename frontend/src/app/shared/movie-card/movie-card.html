<a [routerLink]="['/movie', tmdbId()]"
   class="group block overflow-hidden rounded-lg bg-neutral-900 ring-1 ring-neutral-800 transition hover:ring-brand">
  <div class="relative aspect-[2/3] bg-neutral-800">
    @if (posterUrl(); as url) {
      <img [src]="url" [alt]="title()" loading="lazy"
           class="h-full w-full object-cover transition group-hover:scale-105" />
    } @else {
      <div class="flex h-full items-center justify-center px-2 text-center text-sm text-neutral-600">
        Poster yok
      </div>
    }
    <span class="absolute right-2 top-2 rounded-full bg-black/70 px-2 py-0.5 text-xs font-semibold text-amber-400">
      ★ {{ voteAverage() | number: '1.1-1' }}
    </span>
  </div>
  <div class="p-2">
    <h3 class="truncate text-sm font-medium text-neutral-100">{{ title() }}</h3>
  </div>
</a>
