<div class="grid grid-cols-2 gap-4 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5">
  @for (movie of movies(); track movie.tmdbId) {
    <app-movie-card
      [tmdbId]="movie.tmdbId"
      [title]="movie.title"
      [posterPath]="movie.posterPath"
      [voteAverage]="movie.voteAverage"
    />
  }
</div>
