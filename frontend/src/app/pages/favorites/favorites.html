<h1 class="mb-4 text-2xl font-bold">Favorilerim</h1>

@if (loading()) {
  <p class="text-neutral-400">Yükleniyor…</p>
} @else if (favorites().length === 0) {
  <p class="text-neutral-400">Henüz favori eklemedin.</p>
} @else {
  <div class="grid grid-cols-2 gap-4 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5" appAutoAnimate>
    @for (f of favorites(); track f.tmdbMovieId; let i = $index) {
      <div class="animate-fade-up group relative overflow-hidden rounded-lg bg-neutral-900 ring-1 ring-neutral-800"
           [style.animation-delay.ms]="(i % 12) * 40">
        <a [routerLink]="['/movie', f.tmdbMovieId]">
          <div class="aspect-[2/3] bg-neutral-800">
            @if (posterUrl(f.posterPath); as url) {
              <img [src]="url" [alt]="f.title" loading="lazy" class="h-full w-full object-cover" />
            } @else {
              <div class="flex h-full items-center justify-center text-sm text-neutral-600">Poster yok</div>
            }
          </div>
          <div class="p-2"><h3 class="truncate text-sm font-medium">{{ f.title }}</h3></div>
        </a>
        <button (click)="remove(f.tmdbMovieId)"
          class="absolute right-2 top-2 rounded-full bg-black/70 px-2 py-1 text-xs text-red-400
                 opacity-0 transition hover:scale-110 active:scale-90 group-hover:opacity-100"
          title="Favorilerden çıkar">✕</button>
      </div>
    }
  </div>
}
